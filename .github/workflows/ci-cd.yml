name: CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: demo/vehicle-registration-backend-micro
  APP_PORT: "8080"
  APP_HEALTH_PATH: /catalog/makes

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7

  image:
    name: Build and Push Image to ECR
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          IMAGE_URI="${{ steps.meta.outputs.image_uri }}"
          LATEST_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"

          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          docker tag "$IMAGE_URI" "$LATEST_URI"
          docker push "$LATEST_URI"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: image
    steps:
      - name: Deploy app on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu

            AWS_REGION="${{ env.AWS_REGION }}"
            APP_PORT="${{ env.APP_PORT }}"
            APP_HEALTH_PATH="${{ env.APP_HEALTH_PATH }}"
            IMAGE_URI="${{ needs.image.outputs.image_uri }}"
            DB_NAME="vehicle_db"
            DB_USER="vehicle_user"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            DEPLOY_DIR="$HOME/vehicle-registration-backend-micro"
            COMPOSE_FILE="$DEPLOY_DIR/docker-compose.ec2.yml"

            if [ -z "$DB_PASSWORD" ]; then
              DB_PASSWORD="vehicle_pass"
            fi

            if ! command -v aws >/dev/null 2>&1; then
              echo "Error: aws CLI not found on EC2." >&2
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Error: docker not found on EC2." >&2
              exit 1
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            elif sudo docker info >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker"
            else
              echo "Error: Docker daemon not reachable for current user or via sudo." >&2
              exit 1
            fi

            if sh -c "$DOCKER_CMD compose version" >/dev/null 2>&1; then
              COMPOSE_CMD="$DOCKER_CMD compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Error: docker compose not installed." >&2
              exit 1
            fi

            ECR_REGISTRY="$(echo "$IMAGE_URI" | cut -d/ -f1)"

            mkdir -p "$DEPLOY_DIR"

            cat > "$COMPOSE_FILE" <<EOF
            services:
              db:
                image: "postgres:16-alpine"
                environment:
                  POSTGRES_DB: "${DB_NAME}"
                  POSTGRES_USER: "${DB_USER}"
                  POSTGRES_PASSWORD: "${DB_PASSWORD}"
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
                  interval: 10s
                  timeout: 5s
                  retries: 10

              app:
                image: "${IMAGE_URI}"
                depends_on:
                  db:
                    condition: service_healthy
                ports:
                  - "${APP_PORT}:8080"
                environment:
                  SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/${DB_NAME}"
                  SPRING_DATASOURCE_USERNAME: "${DB_USER}"
                  SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD}"

            volumes:
              postgres-data:
            EOF

            echo "Generated compose file:"
            cat "$COMPOSE_FILE"

            # Validate compose syntax before up; prints a useful error location when malformed.
            sh -c "$COMPOSE_CMD -f $COMPOSE_FILE config >/dev/null"

            aws ecr get-login-password --region "$AWS_REGION" | sh -c "$DOCKER_CMD login --username AWS --password-stdin $ECR_REGISTRY"
            sh -c "$DOCKER_CMD pull $IMAGE_URI"
            sh -c "$COMPOSE_CMD -f $COMPOSE_FILE up -d --remove-orphans"

            if ! command -v curl >/dev/null 2>&1; then
              echo "Error: curl is required for readiness checks." >&2
              exit 1
            fi

            APP_LOCAL_URL="http://localhost:${APP_PORT}${APP_HEALTH_PATH}"
            echo "Waiting for app readiness at $APP_LOCAL_URL"
            i=0
            until [ "$i" -ge 60 ]; do
              if curl -fsS "$APP_LOCAL_URL" >/dev/null 2>&1; then
                echo "App is responding. Deployment succeeded."
                exit 0
              fi
              i=$((i + 1))
              sleep 2
            done

            echo "Error: app did not become healthy at $APP_LOCAL_URL within timeout." >&2
            sh -c "$COMPOSE_CMD -f $COMPOSE_FILE ps" || true
            sh -c "$COMPOSE_CMD -f $COMPOSE_FILE logs --tail=100 app" || true
            exit 1

